<!DOCTYPE html>

<html>
  <head>
    <meta name="description" content="">
    <title> 001 - 002 </title>
    <meta charset="UTF-8">
  </head>

  <body>
    001 <br>
    <form action="" method="get">
      <div>
        <label for="use">Username</label>
        <input 
          id="use" 
          type="text" 
          autofocus 
          minlength="5" 
          maxlength="20" 
          required
          name="username">

      </div>
      <br><hr><br>
      <div>
        <label for="ema">Email</label>
        <input 
          id="ema" 
          type="email" 
          value="o@o.com" 
          readonly
          name="email">
      </div>
      <br><hr><br>
      <div>
        <label for="tok">Token</label>
        <input 
          id="tok" 
          type="hidden" 
          value="b92f1fc2fce391ad7af633723afd3055"
          name="token">
      </div>
      <br><hr><br>
      002
      <!-- Skills -->
      <div>
        <input id="pla" type="checkbox" name="skills" value="Planning">
        <label for="pla">Planning</label>
      </div>
      <div>
        <input id="ana" type="checkbox" name="skills" value="Analysis">
        <label for="ana">Analysis</label>
      </div>
      <div>
        <input id="adv" type="checkbox" name="skills" value="Advanced Search">
        <label for="adv">Advanced Search</label>
      </div>
      <div>
        <input id="log" type="checkbox" name="skills" value="Logical Thinking">
        <label for="log">Logical Thinking</label>
      </div>
      <div>
        <input id="prob" type="checkbox" name="skills" value="Problem Solving">
        <label for="prob">Problem Solving</label>
      </div>
      <br><hr><br>


      <!-- Career-->
      <div>
       <input id="fro" type="radio" name="career" value="Front-End Developer">
       <label for="fro">Front-End Developer</label>
      </div>
      <div>
       <input id="bac" type="radio" name="career" value="Back-End Developer">
       <label for="bac">Back-End Developer</label>
      </div>
      <div>
       <input id="bus" type="radio" name="career" value="Business Analyst">
       <label for="bus">Business Analyst</label>
      </div>
      <div>
       <input id="proj" type="radio" name="career" value="Project Manager">
       <label for="proj">Project Manager</label>
      </div>
      <div>
       <input id="scr" type="radio" name="career" value="Scrum Master">
       <label for="scr">Scrum Master</label>
      </div>

      <br><hr><br>
      003

      <div>
        <label for="Prog">Choose =></label>
        <select id="prog" name="prog">
          <optgroup label="P H P">
            <option value="V5">V5.0</option>
            <option value="v7">V7.0</option>
            <option value="v8">V8.0</option>
          </optgroup>
          <optgroup label="Python">
            <option value="V2">V2.0</option>
            <option value="v3">V3.0</option>
            <option value="v3.9">V3.9</option>
          </optgroup>
        </select>
      </div>

      <br>
      <div>
        <textarea name="brief" cols="30" rows="10" placeholder="Write Here Why You Want To Learn Programming" maxlength="100"></textarea> <!-- cols & rows = width & hight-->
      </div>
      
      <br><br>
      <input type="reset" value="Empty">
      <input type="submit" value="Send">
    </form>


  </body>
</html>
